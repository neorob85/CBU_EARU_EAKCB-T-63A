; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:cbu]
platform = libretiny
board = cbu
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbserial-0001
upload_speed = 115200
monitor_port = /dev/cu.usbserial-0001
extra_scripts = pre:extra/load_env.py
build_flags =
	-D LT_UART_DEFAULT_PORT=2
	-D LT_LOGLEVEL=5
lib_deps =
	neorob85/PrefsManager@^1.0.0
	neorob85/ESPOTADASH@^1.2.0
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.2.2
	neorob85/NTC@^1.0.0
	neorob85/HAmqttSTR@^1.1.1

[env:cbu-ota]
platform = libretiny
board = cbu
framework = arduino
upload_protocol = custom
upload_port = 192.168.1.251
upload_command = curl -s -X POST http://${UPLOAD_PORT}/update -F "firmware=@${SOURCE}"
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
extra_scripts = pre:extra/load_env.py
build_flags =
	-D LT_UART_DEFAULT_PORT=2
	-D LT_LOGLEVEL=5
lib_deps =
	neorob85/PrefsManager@^1.0.0
	neorob85/ESPOTADASH@^1.2.0
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.2.2
	neorob85/NTC@^1.0.0
	neorob85/HAmqttSTR@^1.1.1

; OTA tramite l'AP di provisioning (dispositivo non configurato, IP 10.0.0.1)
[env:cbu-ota-prov]
platform = libretiny
board = cbu
framework = arduino
upload_protocol = custom
upload_port = 10.0.0.1
upload_command = curl -s -X POST http://${UPLOAD_PORT}/update -F "firmware=@${SOURCE}"
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
extra_scripts = pre:extra/load_env.py
build_flags =
	-D LT_UART_DEFAULT_PORT=2
	-D LT_LOGLEVEL=5
lib_deps =
	neorob85/PrefsManager@^1.0.0
	neorob85/ESPOTADASH@^1.2.0
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.2.2
	neorob85/NTC@^1.0.0
	neorob85/HAmqttSTR@^1.1.1
